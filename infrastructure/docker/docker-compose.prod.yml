# Single-container-per-service deployment per adr/0004 ("early production runs as a single
# containerized deployment on a managed container platform"). Any platform that can run
# these three images from a docker-compose-shaped config satisfies that ADR — this file is
# the reference shape, not a commitment to a specific host.
#
# Usage: see project-memory-bank/15-deployment.md for the full runbook (migration step,
# required .env, health-check verification).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-pee}
    volumes:
      - pee_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-pee}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: ../../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pee}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pee}?schema=public
      PORT: 3001
    ports:
      - '3001:3001'
    healthcheck:
      test: ['CMD-SHELL', "node -e \"require('http').get('http://localhost:3001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/web.Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    env_file: ../../.env
    environment:
      INTERNAL_API_URL: http://api:3001
      PORT: 3000
    ports:
      - '3000:3000'

volumes:
  pee_postgres_data:

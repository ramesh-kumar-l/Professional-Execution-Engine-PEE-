name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pee
          POSTGRES_PASSWORD: pee
          POSTGRES_DB: pee_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pee"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://pee:pee@localhost:5432/pee_test?schema=public
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 7d
      PORT: 3001
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-nextauth-secret
      INTERNAL_API_URL: http://localhost:3001
      AI_PROVIDER: anthropic
      ANTHROPIC_API_KEY: ci-placeholder-anthropic-key
      ANTHROPIC_MODEL: claude-sonnet-5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Generate local-client SQLite Prisma client
        run: npm run prisma:generate -w @pee/local-client

      - name: Apply database migrations
        run: npx prisma migrate deploy --schema packages/database/prisma/schema.prisma

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit + integration tests
        run: npm run test

      - name: Auth service e2e tests
        run: npm run test:e2e -w @pee/auth

      - name: Projects service e2e tests
        run: npm run test:e2e -w @pee/projects

      - name: Planning service e2e tests
        run: npm run test:e2e -w @pee/planning

      - name: Execution service e2e tests
        run: npm run test:e2e -w @pee/execution

      - name: Sync service e2e tests
        run: npm run test:e2e -w @pee/sync

      - name: AI service e2e tests
        run: npm run test:e2e -w @pee/ai

      - name: Local-client e2e tests (SQLite <-> Postgres round trip)
        run: npm run test:e2e -w @pee/local-client

      - name: Build
        run: npm run build

      - name: Start API server
        run: |
          nohup npm run start -w @pee/api > api.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:3001/health && break || sleep 1; done

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start web app
        run: |
          nohup npm run start -w web > web.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:3000 && break || sleep 1; done

      - name: Web unit tests (Vitest)
        run: npm run test -w web

      - name: Web e2e tests (Playwright)
        run: npm run test:e2e -w web

      - name: Dump server logs on failure
        if: failure()
        run: |
          echo "--- api.log ---"; cat api.log || true
          echo "--- web.log ---"; cat web.log || true

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pee
      POSTGRES_PASSWORD: pee
      POSTGRES_DB: pee_dev
    ports:
      - '5432:5432'
    volumes:
      - pee_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pee']
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-test:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pee
      POSTGRES_PASSWORD: pee
      POSTGRES_DB: pee_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pee']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pee_postgres_data:
